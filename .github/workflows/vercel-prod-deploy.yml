name: Vercel Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel production deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is not configured."
            echo "Add it in GitHub repository secrets to enable fallback deploy triggering."
            exit 1
          fi

          curl --fail --silent --show-error --request POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "Vercel deploy hook triggered successfully."
